<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NestBook — Car Door Magnetic Sign (Portrait 300x450mm)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark:  #1a4710;
    --mid:   #2f771b;
    --light: #d9f0cc;
    --leaf:  #3a9122;
    --white: #ffffff;
  }

  /* 300mm × 450mm portrait */
  @page { size: 300mm 450mm portrait; margin: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #888;
    display: flex;
    justify-content: center;
    padding: 24px;
    min-height: 100vh;
  }

  .page {
    width: 300mm;
    height: 450mm;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 8px 60px rgba(0,0,0,0.35);
    transform: scale(0.3);
    transform-origin: top left;
    position: relative;
  }

  /* Subtle decorative circle */
  .page::before {
    content: '';
    position: absolute;
    width: 400mm;
    height: 400mm;
    border-radius: 50%;
    border: 40mm solid rgba(255,255,255,0.03);
    top: -220mm;
    right: -160mm;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 0 28mm;
    position: relative;
    z-index: 1;
  }

  .logo {
    width: 88mm;
    height: 88mm;
    margin-bottom: 10mm;
  }

  .wordmark {
    color: var(--white);
    font-size: 78px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 12mm;
  }

  .tagline {
    color: var(--light);
    font-size: 36px;
    font-weight: 700;
    line-height: 1.25;
    text-align: center;
    letter-spacing: -0.5px;
    opacity: 0.9;
    margin-bottom: 16mm;
  }

  .stripe {
    width: 220mm;
    height: 7px;
    background: linear-gradient(90deg, var(--leaf), var(--light), var(--leaf));
    border-radius: 4px;
    margin-bottom: 16mm;
  }

  .trial {
    color: #7dde5a;
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -1px;
    text-align: center;
    margin-bottom: 5mm;
  }

  .trial-sub {
    color: rgba(217,240,204,0.65);
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 22mm;
  }

  .url {
    color: var(--light);
    font-size: 54px;
    font-weight: 900;
    letter-spacing: -1.5px;
    text-decoration: none;
  }

  @media print {
    body { background: none; padding: 0; }
    .page { transform: none; box-shadow: none; }
    .download-bar { display: none !important; }
    .page { transform: none !important; }
  }

  /* ── Download bar ── */
  .download-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    background: #1a4710; color: #fff;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 12px;
    font-family: Arial, sans-serif; font-size: 14px;
  }
  .download-btn {
    background: #fff; color: #1a4710; border: none;
    padding: 8px 16px; border-radius: 6px;
    cursor: pointer; font-weight: bold; font-size: 13px;
    font-family: Arial, sans-serif;
  }
  .download-btn.secondary {
    background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.6);
  }
  .download-hint { font-size: 11px; opacity: 0.75; margin-left: auto; }

  @media screen {
    body { min-height: calc(450mm * 0.3 + 60px); }
  }
</style>
</head>
<body>
<div class="download-bar">
  <button class="download-btn" onclick="downloadPDF()">&#8659; Download PDF</button>
  <button class="download-btn secondary" onclick="downloadPNG()">&#128444; Download PNG</button>
  <span class="download-hint">PDF = full colours, correct dimensions &bull; PNG = screenshot</span>
</div>
<div class="page">
  <div class="content">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="90" fill="#1a4710"/>
      <ellipse cx="256" cy="240" rx="130" ry="160" fill="#2f771b"/>
      <ellipse cx="256" cy="240" rx="95" ry="125" fill="#3a9122"/>
      <line x1="256" y1="110" x2="256" y2="390" stroke="#d9f0cc" stroke-width="9" stroke-linecap="round"/>
      <line x1="256" y1="190" x2="185" y2="165" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="230" x2="175" y2="215" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="270" x2="185" y2="265" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="190" x2="327" y2="165" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="230" x2="337" y2="215" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="270" x2="327" y2="265" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="390" x2="256" y2="440" stroke="#d9f0cc" stroke-width="8" stroke-linecap="round"/>
      <line x1="256" y1="430" x2="225" y2="460" stroke="#d9f0cc" stroke-width="7" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">NestBook</div>
    <div class="tagline">Booking software for<br>B&amp;Bs &amp; guest houses</div>
    <div class="stripe"></div>
    <div class="trial">Free 30-day trial</div>
    <div class="trial-sub">No card required &middot; nestbook.io/app/register</div>
    <a class="url" href="https://nestbook.io">nestbook.io</a>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function downloadPDF() {
  var name = window.location.pathname.split('/').pop().replace('.html', '');
  window.location.href = '/api/marketing/pdf/' + name;
}
async function downloadPNG() {
  if (typeof html2canvas === 'undefined') {
    alert('PNG download is still loading, please try again in a moment.');
    return;
  }
  var el = document.querySelector('.page') || document.querySelector('.flag') || document.querySelector('.sheet') || document.querySelector('.card-front') || document.body;
  var canvas = await html2canvas(el, { scale: 2, useCORS: true, allowTaint: false, logging: false });
  canvas.toBlob(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = document.title.replace(/[^a-zA-Z0-9\-]/g, '-').toLowerCase() + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }, 'image/png');
}
</script>
</body>
</html>
