<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NestBook — A-Frame Poster A1 (NL)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --dark:#1a4710; --mid:#2f771b; --light:#d9f0cc; --leaf:#3a9122; --white:#ffffff; }
  @page { size: 594mm 841mm portrait; margin: 0; }
  body { font-family:'Inter',system-ui,sans-serif; background:#aaa; display:flex; justify-content:center; padding:24px; min-height:100vh; }
  .page { width:594mm; height:841mm; background:var(--dark); display:flex; flex-direction:column; overflow:hidden; box-shadow:0 8px 60px rgba(0,0,0,0.3); transform:scale(0.205); transform-origin:top left; }
  .top { flex-shrink:0; display:flex; justify-content:center; padding:42mm 30mm 18mm; }
  .brand-row { display:flex; align-items:center; gap:18px; }
  .big-logo { width:110mm; height:110mm; }
  .brand-name { color:var(--white); font-size:130px; font-weight:900; letter-spacing:-4px; line-height:1; }
  .stripe { height:14px; background:linear-gradient(90deg,var(--leaf),var(--light),var(--leaf)); flex-shrink:0; margin:0 30mm; border-radius:7px; }
  .headline-section { flex-shrink:0; padding:22mm 30mm 0; text-align:center; }
  .headline { color:var(--white); font-size:88px; font-weight:900; line-height:1.05; letter-spacing:-3px; }
  .headline em { color:var(--light); font-style:normal; }
  .qr-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16mm 30mm; gap:10mm; }
  .qr-outer { width:130mm; height:130mm; background:var(--white); border-radius:18mm; display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 10mm rgba(217,240,204,0.15); }
  .qr-outer img { width:110mm; height:110mm; display:block; border-radius:10mm; }
  .qr-caption { color:var(--light); font-size:32px; font-weight:800; letter-spacing:1px; text-transform:uppercase; text-align:center; }
  .url-footer { flex-shrink:0; padding:14mm 30mm 22mm; text-align:center; }
  .url-text { color:var(--white); font-size:72px; font-weight:900; letter-spacing:-2px; text-decoration:none; opacity:0.95; }
  @media print { body { background:none; padding:0; margin:0; overflow:hidden; } .page { transform:none; box-shadow:none; } .download-bar { display: none !important; } .page { transform: none !important; } }
  @media screen { body { min-height:calc(841mm * 0.205 + 60px); } }

  /* ── Download bar ── */
  .download-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    background: #1a4710; color: #fff;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 12px;
    font-family: Arial, sans-serif; font-size: 14px;
  }
  .download-btn {
    background: #fff; color: #1a4710; border: none;
    padding: 8px 16px; border-radius: 6px;
    cursor: pointer; font-weight: bold; font-size: 13px;
    font-family: Arial, sans-serif;
  }
  .download-btn.secondary {
    background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.6);
  }
  .download-hint { font-size: 11px; opacity: 0.75; margin-left: auto; }
</style>
</head>
<body>
<div class="download-bar">
  <button class="download-btn" onclick="downloadPDF()">&#8659; Download PDF</button>
  <button class="download-btn secondary" onclick="downloadPNG()">&#128444; Download PNG</button>
  <span class="download-hint">PDF = full colours, correct dimensions &bull; PNG = screenshot</span>
</div>
<div class="page">

  <div class="top">
    <div class="brand-row">
      <svg class="big-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <rect width="512" height="512" rx="90" fill="#1a4710"/>
        <ellipse cx="256" cy="240" rx="130" ry="160" fill="#2f771b"/>
        <ellipse cx="256" cy="240" rx="95" ry="125" fill="#3a9122"/>
        <line x1="256" y1="110" x2="256" y2="390" stroke="#d9f0cc" stroke-width="9" stroke-linecap="round"/>
        <line x1="256" y1="190" x2="185" y2="165" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
        <line x1="256" y1="230" x2="175" y2="215" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
        <line x1="256" y1="270" x2="185" y2="265" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
        <line x1="256" y1="190" x2="327" y2="165" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
        <line x1="256" y1="230" x2="337" y2="215" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
        <line x1="256" y1="270" x2="327" y2="265" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
        <line x1="256" y1="390" x2="256" y2="440" stroke="#d9f0cc" stroke-width="8" stroke-linecap="round"/>
        <line x1="256" y1="430" x2="225" y2="460" stroke="#d9f0cc" stroke-width="7" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">NestBook</span>
    </div>
  </div>

  <div class="stripe"></div>

  <div class="headline-section">
    <div class="headline">Dag tegen het reservatieboek.<br><em>Beheer uw accommodatie eenvoudig.</em></div>
  </div>

  <div class="qr-section">
    <div class="qr-outer">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=420x420&color=1a4710&bgcolor=ffffff&data=https%3A%2F%2Fnestbook.io%2Fapp%2Fregister" alt="Scan om in te schrijven" width="415" height="415">
    </div>
    <div class="qr-caption">Scan om gratis in te schrijven &mdash; 30 dagen, geen kaart</div>
  </div>

  <div class="url-footer">
    <a class="url-text" href="https://nestbook.io">nestbook.io</a>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function downloadPDF() {
  var name = window.location.pathname.split('/').pop().replace('.html', '');
  window.location.href = '/api/marketing/pdf/' + name;
}
async function downloadPNG() {
  if (typeof html2canvas === 'undefined') {
    alert('PNG download is still loading, please try again in a moment.');
    return;
  }
  var el = document.querySelector('.page') || document.querySelector('.flag') || document.querySelector('.sheet') || document.querySelector('.card-front') || document.body;
  var canvas = await html2canvas(el, { scale: 2, useCORS: true, allowTaint: false, logging: false });
  canvas.toBlob(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = document.title.replace(/[^a-zA-Z0-9\-]/g, '-').toLowerCase() + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }, 'image/png');
}
</script>
</body>
</html>
