<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment — NestBook</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #f8fafc;
    color: #1a2e14;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    border: 1px solid #e2e8f0;
  }
  .icon { font-size: 3rem; margin-bottom: 20px; }
  h1 { font-size: 1.6rem; font-weight: 700; color: #1a4710; margin-bottom: 12px; }
  p  { font-size: 1rem; color: #475569; line-height: 1.6; margin-bottom: 28px; }
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 32px;
  }
  .logo img { width: 28px; height: 28px; border-radius: 6px; }
  .logo span { font-size: 1.05rem; font-weight: 700; color: #1a4710; }
  a.home {
    display: inline-block;
    color: #1a4710;
    font-size: 0.88rem;
    text-decoration: none;
    border: 1.5px solid #1a4710;
    border-radius: 8px;
    padding: 8px 20px;
  }
  a.home:hover { background: #f0fdf4; }
  .countdown {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 14px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #e2e8f0;
    border-top-color: #1a4710;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #state-verifying h1 { color: #475569; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/icon-192.png" alt="NestBook">
    <span>NestBook</span>
  </div>

  <!-- Verifying state -->
  <div id="state-verifying">
    <div class="spinner"></div>
    <h1 id="title-verifying">Confirming your payment…</h1>
    <p id="msg-verifying">Please wait while we confirm your booking.</p>
  </div>

  <!-- Success state (hidden until verified) -->
  <div id="state-success" style="display:none">
    <div class="icon">✅</div>
    <h1 id="title-success">Payment received!</h1>
    <p id="msg-success">Your booking is confirmed. A confirmation email is on its way.</p>
    <p class="countdown" id="countdown-text"></p>
    <a class="home" id="return-now" href="https://nestbook.io"></a>
  </div>

  <!-- Pending state (paid but not yet confirmed by webhook) -->
  <div id="state-pending" style="display:none">
    <div class="icon">⏳</div>
    <h1 id="title-pending">Payment processing…</h1>
    <p id="msg-pending">Your payment is being processed. You'll receive a confirmation email shortly.</p>
    <a class="home" href="https://nestbook.io">nestbook.io</a>
  </div>
</div>
<script>
var T = {
  en: {
    verifying:        'Confirming your payment…',
    verifyingMsg:     'Please wait while we confirm your booking.',
    success:          'Payment received!',
    successMsg:       'Your booking is confirmed. A confirmation email is on its way.',
    pending:          'Payment processing…',
    pendingMsg:       'Your payment is being processed. You’ll receive a confirmation email shortly.',
    redirecting:      function(n) { return 'Redirecting you in ' + n + '…'; },
    returnNow:        'Return now →',
  },
  fr: {
    verifying:        'Confirmation du paiement…',
    verifyingMsg:     'Veuillez patienter pendant que nous confirmons votre réservation.',
    success:          'Paiement reçu !',
    successMsg:       'Votre réservation est confirmée. Un e-mail de confirmation va vous être envoyé.',
    pending:          'Paiement en cours…',
    pendingMsg:       'Votre paiement est en cours de traitement. Vous recevrez un e-mail de confirmation sous peu.',
    redirecting:      function(n) { return 'Redirection dans ' + n + '…'; },
    returnNow:        'Retourner maintenant →',
  },
  de: {
    verifying:        'Zahlung wird bestätigt…',
    verifyingMsg:     'Bitte warten Sie, während wir Ihre Buchung bestätigen.',
    success:          'Zahlung erhalten!',
    successMsg:       'Ihre Buchung ist bestätigt. Eine Bestätigungs-E-Mail ist unterwegs.',
    pending:          'Zahlung wird verarbeitet…',
    pendingMsg:       'Ihre Zahlung wird verarbeitet. Sie erhalten in Kürze eine Bestätigungs-E-Mail.',
    redirecting:      function(n) { return 'Weiterleitung in ' + n + '…'; },
    returnNow:        'Jetzt zurückgehen →',
  },
  es: {
    verifying:        'Confirmando su pago…',
    verifyingMsg:     'Por favor espere mientras confirmamos su reserva.',
    success:          '¡Pago recibido!',
    successMsg:       'Su reserva está confirmada. Le llegará un correo de confirmación en breve.',
    pending:          'Pago en proceso…',
    pendingMsg:       'Su pago está siendo procesado. Recibirá un correo de confirmación en breve.',
    redirecting:      function(n) { return 'Redirigiendo en ' + n + '…'; },
    returnNow:        'Volver ahora →',
  },
  nl: {
    verifying:        'Betaling bevestigen…',
    verifyingMsg:     'Even geduld terwijl we uw boeking bevestigen.',
    success:          'Betaling ontvangen!',
    successMsg:       'Uw boeking is bevestigd. Er is een bevestigingsmail onderweg.',
    pending:          'Betaling verwerken…',
    pendingMsg:       'Uw betaling wordt verwerkt. U ontvangt binnenkort een bevestigingsmail.',
    redirecting:      function(n) { return 'Doorsturen in ' + n + '…'; },
    returnNow:        'Nu teruggaan →',
  },
};

var lang = 'en';
try { var s = sessionStorage.getItem('nb-guest-lang'); if (s && T[s]) lang = s; } catch(_) {}
if (!T[lang]) lang = (navigator.language || '').slice(0, 2).toLowerCase();
var t = T[lang] || T.en;

document.getElementById('title-verifying').textContent = t.verifying;
document.getElementById('msg-verifying').textContent   = t.verifyingMsg;
document.getElementById('title-success').textContent   = t.success;
document.getElementById('msg-success').textContent     = t.successMsg;
document.getElementById('title-pending').textContent   = t.pending;
document.getElementById('msg-pending').textContent     = t.pendingMsg;
document.getElementById('return-now').textContent      = t.returnNow;
document.documentElement.lang = lang;

function showState(name) {
  ['verifying', 'success', 'pending'].forEach(function(s) {
    document.getElementById('state-' + s).style.display = s === name ? '' : 'none';
  });
}

function startCountdown(slug) {
  var dest = slug ? 'https://nestbook.io/book/' + slug : 'https://nestbook.io';
  document.getElementById('return-now').href = dest;
  var secs = 5;
  var el = document.getElementById('countdown-text');
  el.textContent = t.redirecting(secs);
  var timer = setInterval(function() {
    secs--;
    if (secs <= 0) {
      clearInterval(timer);
      location.href = dest;
    } else {
      el.textContent = t.redirecting(secs);
    }
  }, 1000);
}

var params = new URLSearchParams(location.search);
var sessionId = params.get('session_id');

if (!sessionId) {
  // No session_id — old-style URL or direct visit; show pending as safe default
  console.warn('[nestbook] success.html loaded without session_id');
  showState('pending');
} else {
  fetch('/api/widget/verify-session?session_id=' + encodeURIComponent(sessionId))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      console.log('[nestbook] verify-session response:', data);
      if (data.paid) {
        showState('success');
        startCountdown(data.booking_slug || null);
        // Clear any pending-booking localStorage entry for this booking so the
        // recovery banner doesn't reappear after a successful payment.
        try {
          var bid = data.booking_id ? String(data.booking_id) : null;
          if (bid) {
            Object.keys(localStorage).forEach(function(k) {
              if (k.indexOf('nestbook_pending_') === 0) {
                try {
                  var entry = JSON.parse(localStorage.getItem(k));
                  if (entry && String(entry.bookingId) === bid) localStorage.removeItem(k);
                } catch (_) {}
              }
            });
          }
        } catch (_) {}
      } else {
        showState('pending');
      }
    })
    .catch(function(err) {
      console.error('[nestbook] verify-session error:', err);
      showState('pending');
    });
}
</script>
</body>
</html>
