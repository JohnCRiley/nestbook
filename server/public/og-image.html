<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #1a4710;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 68px 80px;
  }

  /* Decorative arcs — mirror the flyer style */
  .arc {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .arc-1 {
    width: 780px;
    height: 780px;
    border: 110px solid rgba(255,255,255,0.045);
    top: -280px;
    right: -200px;
  }
  .arc-2 {
    width: 460px;
    height: 460px;
    border: 70px solid rgba(255,255,255,0.03);
    bottom: -180px;
    left: -100px;
  }
  .arc-3 {
    width: 240px;
    height: 240px;
    border: 40px solid rgba(255,255,255,0.025);
    bottom: 60px;
    right: 80px;
  }

  /* Content layers above the arcs */
  .top, .middle, .bottom { position: relative; z-index: 1; }

  /* Brand row */
  .brand {
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .brand svg {
    width: 70px;
    height: 70px;
    flex-shrink: 0;
  }
  .brand-name {
    font-size: 58px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -1.5px;
    line-height: 1;
  }

  /* Tagline */
  .tagline {
    font-size: 40px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.88);
    line-height: 1.28;
    letter-spacing: -0.3px;
    max-width: 760px;
  }

  /* Bottom URL */
  .url {
    font-size: 26px;
    font-weight: 700;
    color: #d9f0cc;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="arc arc-1"></div>
  <div class="arc arc-2"></div>
  <div class="arc arc-3"></div>

  <div class="top brand">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="90" fill="#2f771b"/>
      <ellipse cx="256" cy="240" rx="130" ry="160" fill="#3a9122"/>
      <ellipse cx="256" cy="240" rx="95" ry="125" fill="#4ab52e"/>
      <line x1="256" y1="110" x2="256" y2="390" stroke="#d9f0cc" stroke-width="9" stroke-linecap="round"/>
      <line x1="256" y1="190" x2="185" y2="165" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="230" x2="175" y2="215" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="270" x2="185" y2="265" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="190" x2="327" y2="165" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="230" x2="337" y2="215" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="270" x2="327" y2="265" stroke="#d9f0cc" stroke-width="5" stroke-linecap="round"/>
      <line x1="256" y1="390" x2="256" y2="440" stroke="#d9f0cc" stroke-width="8" stroke-linecap="round"/>
      <line x1="256" y1="430" x2="225" y2="460" stroke="#d9f0cc" stroke-width="7" stroke-linecap="round"/>
    </svg>
    <span class="brand-name">NestBook</span>
  </div>

  <div class="middle tagline">
    Booking software built for<br>B&amp;Bs and guest houses
  </div>

  <div class="bottom url">nestbook.io</div>
</body>
</html>
