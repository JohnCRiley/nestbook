server {
    listen 80;
    server_name _;

    # ── React SPA at /app/ ────────────────────────────────────────────────────
    # Served directly from the Vite production build.
    # Unknown paths fall back to index.html so React Router handles routing.
    location /app/ {
        alias /opt/nestbook/client/dist/;
        index index.html;
        try_files $uri $uri/ @spa_fallback;
    }

    location @spa_fallback {
        root /opt/nestbook/client/dist;
        rewrite .* /index.html break;
    }

    # ── API — proxy to Node.js on port 3001 ──────────────────────────────────
    location /api/ {
        proxy_pass             http://127.0.0.1:3001;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        'upgrade';
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     60s;
        # Pass raw body unchanged — required for Stripe webhook signature check
        proxy_request_buffering off;
    }

    # ── Everything else → Express ─────────────────────────────────────────────
    # Covers: / (landing page), /widget.js, /widget-test.html
    # Express serves these from server/public/ via express.static().
    location / {
        proxy_pass             http://127.0.0.1:3001;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     60s;
    }
}
