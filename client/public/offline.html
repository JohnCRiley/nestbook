<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NestBook — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0faf0;
      color: #1a2e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; color: #1a4710; }
    p  { font-size: 0.95rem; color: #5a7a5a; line-height: 1.6; margin-bottom: 28px; }
    button {
      background: #1a4710;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2f7a1f; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="14" fill="#1a4710"/>
      <ellipse cx="32" cy="30" rx="16" ry="20" fill="#3a9122"/>
      <line x1="32" y1="14" x2="32" y2="49" stroke="#d9f0cc" stroke-width="2" stroke-linecap="round"/>
      <line x1="32" y1="24" x2="23" y2="21" stroke="#d9f0cc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="32" y1="30" x2="22" y2="27" stroke="#d9f0cc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="32" y1="24" x2="41" y2="21" stroke="#d9f0cc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="32" y1="30" x2="42" y2="27" stroke="#d9f0cc" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>You're offline</h1>
    <p>NestBook needs a connection right now. Check your network and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
